spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

samjhana:
  security:
    jwt:
      secret: test-jwt-secret-key-for-ci-only-32-chars-min
      expiration-hours: 1
  fuel-price-scraper:
    enabled: false

logging:
  level:
    root: WARN
    com.samjhana: DEBUG
    org.hibernate.SQL: WARN