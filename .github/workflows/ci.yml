name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # weekly security scan — Monday 2am UTC

jobs:

  # ── Runs on every push/PR ──────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Frontend tests
        run: npm test -- --run
        working-directory: frontend

      - name: npm audit — production deps (blocking)
        run: npm audit --audit-level=high --omit=dev
        working-directory: frontend

      - name: Backend tests + coverage
        run: mvn test jacoco:report --no-transfer-progress
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
          SPRING_PROFILES_ACTIVE: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: target/site/jacoco/
          retention-days: 7

  # ── Runs on push to main after ci passes ──────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Build JAR
        # JWT_SECRET injected at runtime by systemd, not baked into JAR
        # The build only needs DB url to validate datasource config at startup
        run: mvn clean package -DskipTests --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.NEON_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.NEON_PASSWORD }}
          SPRING_PROFILES_ACTIVE: prod

      - name: Backup current JAR on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp /home/ubuntu/app/ventures-os.jar \
               /home/ubuntu/app/ventures-os-backup.jar 2>/dev/null || true

      - name: Copy new JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/*.jar
          target: /home/ubuntu/app/ventures-os.jar
          strip_components: 1

      - name: Restart + health check + auto-rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart ventures-os

            echo "Waiting for app to become healthy..."
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:8080/actuator/health 2>/dev/null)
              if [ "$STATUS" = "200" ]; then
                echo "Healthy after ${i} attempts"
                rm -f /home/ubuntu/app/ventures-os-backup.jar
                exit 0
              fi
              echo "Attempt $i — HTTP $STATUS, retrying in 4s..."
              sleep 4
            done

            echo "Health check failed after 15 attempts — rolling back"
            cp /home/ubuntu/app/ventures-os-backup.jar \
               /home/ubuntu/app/ventures-os.jar
            sudo systemctl restart ventures-os
            exit 1

      - name: Notify on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${context.sha.substring(0,7)}`,
              body: `**Deploy failed** on \`${new Date().toISOString()}\`\n\n` +
                    `Commit: ${context.sha}\n` +
                    `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `The previous version has been automatically restored.`,
              labels: ['deploy-failure']
            })

  # ── Runs on schedule only — weekly Monday 2am UTC ─────────────
  security-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: samjhana-ventures-os
          path: '.'
          format: HTML
          args: --failOnCVSS 7 --enableRetired

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript
          queries: security-extended

      - name: Build for CodeQL
        run: mvn clean package -DskipTests --no-transfer-progress
        env:
          JWT_SECRET: ci-placeholder

      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3

      - name: Notify if weekly scan finds issues
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly security scan found issues — ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly OWASP/CodeQL scan detected issues.\n\n` +
                    `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `Download the OWASP report artifact from the run above to see details.`,
              labels: ['security']
            })

# ── Required secrets ──────────────────────────────────────────────
# Repository secrets (Settings → Secrets → Actions):
#   JWT_SECRET_CI        any string, used for test runs only
#
# Environment: production (Settings → Environments → production):
#   NEON_DATABASE_URL    postgresql://...@ep-xxx.neon.tech/neondb?sslmode=require
#   NEON_USERNAME        restricted DB user (not owner)
#   NEON_PASSWORD        restricted DB user password
#   TAILSCALE_IP         100.x.x.x  (Oracle VPS Tailscale address)
#   SERVER_USER          ubuntu
#   SSH_PRIVATE_KEY      contents of ~/.ssh/id_ed25519
#
# ── systemd service on Oracle VPS (/etc/systemd/system/ventures-os.service) ──
# JWT_SECRET lives here — in the server environment, not in the pipeline
#
# [Unit]
# Description=Samjhana Ventures OS
# After=network.target
#
# [Service]
# User=ubuntu
# WorkingDirectory=/home/ubuntu/app
# ExecStart=/usr/bin/java -jar /home/ubuntu/app/ventures-os.jar
# Environment="JWT_SECRET=your-strong-secret-here"
# Environment="SPRING_PROFILES_ACTIVE=prod"
# Restart=always
# RestartSec=10
#
# [Install]
# WantedBy=multi-user.target
