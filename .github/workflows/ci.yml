name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'   # weekly security scan — Monday 2am UTC

# Cancel in-progress runs on new push to same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS REQUIRED
#
# Repository → Settings → Secrets → Actions:
#   JWT_SECRET_CI          any string, used for test runs only
#
# Environment: production (Settings → Environments → production):
#   NEON_DATABASE_URL      postgresql://...@ep-xxx.neon.tech/neondb?sslmode=require
#   NEON_USERNAME          restricted DB user (not owner)
#   NEON_PASSWORD          restricted DB user password
#   TAILSCALE_IP           100.x.x.x  (Oracle VPS Tailscale address)
#   SERVER_USER            ubuntu
#   SSH_PRIVATE_KEY        contents of ~/.ssh/id_ed25519
#
# systemd on Oracle VPS holds JWT_SECRET at runtime — not baked into JAR
# ─────────────────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Secret scan — runs first, blocks everything if it fails ──────────
  secrets-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Backend — unit tests ──────────────────────────────────────────────
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run unit tests
        run: |
          mvn test --no-transfer-progress -Pdev \
            -Dtest="*StrategyTest,*EngineTest,*ServiceTest,*UtilTest" \
            -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports/
          retention-days: 7

  # ── 3. Backend — integration tests ──────────────────────────────────────
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run integration tests
        run: |
          mvn test --no-transfer-progress -Pdev \
            -Dtest="*IntegrationTest,*ControllerTest" \
            -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: target/surefire-reports/
          retention-days: 7

  # ── 4. Backend — full test run with coverage ─────────────────────────────
  backend-coverage:
    name: Backend Coverage Gate
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - name: Run all tests with JaCoCo coverage
        run: mvn verify --no-transfer-progress -Pdev
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: ${{ secrets.JWT_SECRET_CI }}
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 14

  # ── 5. Admin frontend — lint + unit + component tests ───────────────────
  frontend-admin-tests:
    name: Admin Frontend Tests (samjhana-admin)
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: samjhana-admin/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: samjhana-admin
      - name: ESLint
        run: npm run lint
        working-directory: samjhana-admin
      - name: Vitest — unit + component tests
        run: npm test
        working-directory: samjhana-admin
      - name: npm audit (production deps)
        run: npm audit --audit-level=high --omit=dev
        working-directory: samjhana-admin

  # ── 6. Public frontend — lint + unit tests ──────────────────────────────
  frontend-web-tests:
    name: Public Frontend Tests (samjhana-web)
    runs-on: ubuntu-latest
    needs: secrets-scan
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: samjhana-web/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: samjhana-web
      - name: ESLint
        run: npm run lint
        working-directory: samjhana-web
        continue-on-error: true   # ESLint not fully configured yet; warn only
      - name: Vitest — component tests
        run: npm test
        working-directory: samjhana-web
      - name: npm audit (production deps)
        run: npm audit --audit-level=high --omit=dev
        working-directory: samjhana-web

  # ── 7. Build verification — all tests must pass ──────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs:
      - backend-coverage
      - frontend-admin-tests
      - frontend-web-tests
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: samjhana-admin/package-lock.json
      - name: Build admin frontend
        run: npm ci && npm run build
        working-directory: samjhana-admin
      - name: Build production JAR
        run: mvn clean package -DskipTests --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: prod
          SPRING_DATASOURCE_URL: ${{ secrets.NEON_DATABASE_URL || 'jdbc:h2:mem:buildcheck' }}
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ventures-os-jar
          path: target/*.jar
          retention-days: 3

  # ── 8. Deploy to production ──────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ventures-os-jar
          path: target/
      - name: Backup current JAR on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cp /home/ubuntu/app/ventures-os.jar \
               /home/ubuntu/app/ventures-os-backup.jar 2>/dev/null || true
      - name: Copy new JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/*.jar
          target: /home/ubuntu/app/ventures-os.jar
          strip_components: 1
      - name: Restart + health check + auto-rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart ventures-os

            echo "Waiting for app to become healthy..."
            for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://localhost:8080/actuator/health 2>/dev/null)
              if [ "$STATUS" = "200" ]; then
                echo "Healthy after ${i} attempts"
                rm -f /home/ubuntu/app/ventures-os-backup.jar
                exit 0
              fi
              echo "Attempt $i — HTTP $STATUS, retrying in 4s..."
              sleep 4
            done

            echo "Health check failed — rolling back"
            cp /home/ubuntu/app/ventures-os-backup.jar \
               /home/ubuntu/app/ventures-os.jar
            sudo systemctl restart ventures-os
            exit 1
      - name: Notify on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy failed — ${context.sha.substring(0,7)}`,
              body: `**Deploy failed** on \`${new Date().toISOString()}\`\n\n` +
                    `Commit: ${context.sha}\n` +
                    `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
                    `The previous version has been automatically restored.`,
              labels: ['deploy-failure']
            })

  # ── 9. Weekly deep security scan ─────────────────────────────────────────
  security-weekly:
    name: Weekly Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit — admin frontend
        run: npm ci && npm audit --audit-level=moderate
        working-directory: samjhana-admin
        continue-on-error: true
      - name: npm audit — public frontend
        run: npm ci && npm audit --audit-level=moderate
        working-directory: samjhana-web
        continue-on-error: true
      - name: OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: samjhana-ventures-os
          path: '.'
          format: HTML
          args: --failOnCVSS 7 --enableRetired
      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java, javascript
          queries: security-extended
      - name: Build for CodeQL
        run: mvn clean package -DskipTests --no-transfer-progress
        env:
          JWT_SECRET: ci-placeholder
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
      - name: Notify on scan failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly security scan found issues — ${new Date().toISOString().split('T')[0]}`,
              body: `The weekly OWASP/CodeQL scan detected issues.\n\n` +
                    `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security']
            })